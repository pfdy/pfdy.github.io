<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>标签打印</title>
    <style>
        @page {
            size: 50mm 40mm;
            margin: 0mm;
        }

        @media print {
            html, body {
                margin: 0;
                padding: 0;
                width: 50mm;
                height: 40mm;
                overflow: hidden;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body > *:not(svg) {
                display: none !important;
            }

            svg {
                display: block;
                page-break-inside: avoid;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        svg {
            width: 50mm;
            height: 40mm;
        }

        button {
            margin-top: 8px;
            padding: 8px 24px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
        <g transform="translate(50,10) scale(0.5859375)">
            <path fill="#000" d="M231,56c64.5,0,121.8,30.5,158.4,77.9l-42.2,1.1c-30.2-29-71.1-46.8-116.2-46.8c-92.7,0-167.8,75.1-167.8,167.8S138.3,423.8,231,423.8c92.7,0,167.8-75.1,167.8-167.8c0-5.1-0.2-10.1-0.7-15.1l31.9-4.3c0.6,6.4,0.9,12.9,0.9,19.5c0,110.5-89.5,200-200,200c-110.5,0-200-89.5-200-200S120.5,56,231,56z"/>
            <path fill="#000" d="M251.1,363l11.5-72.7h-51.2L198,363h-93l34.6-194l-16.8-20h114.5l-12.8,69.6h49.4l11-69.6c15.3-17.5,145.6,9.3,178.7-36c0,0,15.4,48.4-57,58.4c-72.5,10-76.4,41.7-78.1,62c0,0,15.9-39.8,52.1-38.6s60,7.1,84.3-10.2c0,0-0.7,31.3-37.2,43.5c-30.7,10.2-52.3-0.4-64.9,48.3L347,363H251.1z"/>
            <circle fill="#FFF" cx="180" cy="180" r="10"/>
        </g>
    </svg>
    <button onclick="window.print()">打印</button>
</body>

</html>
