<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <title>标签打印</title>
    <style>
        @page {
            size: 50mm 40mm;
            margin: 0mm;
        }

        @media print {
            html, body {
                margin: 0;
                padding: 0;
                width: 50mm;
                height: 40mm;
                overflow: hidden;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body > *:not(svg) {
                display: none !important;
            }

            svg {
                display: block;
                page-break-inside: avoid;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        svg {
            width: 50mm;
            height: 40mm;
        }

        .controls {
            margin-top: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .controls label {
            font-size: 14px;
        }

        .controls input {
            width: 100px;
            padding: 4px 8px;
            font-size: 16px;
            border: 1px solid #999;
            border-radius: 4px;
            text-align: center;
        }

        button {
            margin-top: 8px;
            padding: 8px 24px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320">
        <rect x="18" y="18" width="364" height="184" rx="15" fill="#000" />
        <text id="text1" x="200" y="122" font-size="144" font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle" textlength="320" font-family="sans-serif">
            阀坏
        </text>
        <text id="text2" x="200" y="265" font-size="72" font-weight="600" fill="#000" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif">
            需要更换
        </text>
    </svg>
    <div class="controls">
        <label>主文字：<input id="input1" type="text" value="阀坏" placeholder="阀坏" oninput="updateText()" /></label>
        <label>副文字：<input id="input2" type="text" value="需要更换" placeholder="需要更换" oninput="updateText()" /></label>
    </div>
    <button onclick="window.print()">打印</button>
    <script>
        function updateText() {
            var t1 = document.getElementById('input1').value || document.getElementById('input1').placeholder;
            var t2 = document.getElementById('input2').value || document.getElementById('input2').placeholder;
            document.getElementById('text1').textContent = t1;
            document.getElementById('text2').textContent = t2;
        }
    </script>
</body>

</html>
