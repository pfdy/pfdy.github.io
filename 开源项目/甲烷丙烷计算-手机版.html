<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THC 充装记录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-size: 12px; font-family: "Microsoft YaHei", sans-serif; background: #eef2f7; color: #222; padding: 6px; -webkit-tap-highlight-color: transparent; min-width: 320px; max-width: 640px; margin: 0 auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 3px; table-layout: fixed; }
td { padding: 5px 3px; font-size: 12px; vertical-align: middle; text-align: center; height: 36px; border: 1px solid #d8dce5; word-break: break-all; }
td:first-child { width: 16%; }
.td-hdr { font-weight: 700; font-size: 10px; color: #fff; background: #3a7fc8; }
.row-title { background: #245eaf !important; color: #fff; font-weight: 700; font-size: 12px; }
tbody.s2 tr td { background: #dce8f5; }
tbody.s2 tr td:first-child { color: #555; }
tbody.s2 tr:first-child td:first-child, thead tr:first-child td:first-child { border-radius: 6px 0 0 0; }
tbody.s2 tr:first-child td:last-child, thead tr:first-child td:last-child { border-radius: 0 6px 0 0; }
tbody.s2 tr:last-child td:first-child { border-radius: 0 0 0 6px; }
tbody.s2 tr:last-child td:last-child { border-radius: 0 0 6px 0; }
.sum td { font-weight: 700; font-size: 11px; }
.sum td:first-child { border-radius: 0 0 0 6px; }
.sum td:last-child { border-radius: 0 0 6px 0; }
input[type="number"] { width: 100%; min-width: 48px; border: 1px solid #abc; text-align: center; font-size: 14px; padding: 6px 2px; color: #c0392b; font-weight: 600; border-radius: 4px; background: #fffef0; -moz-appearance: textfield; height: 36px; touch-action: manipulation; }
input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }
input[type="text"] { width: 100%; border: 1px solid #abc; font-size: 14px; padding: 6px 8px; background: #fff; border-radius: 4px; height: 40px; touch-action: manipulation; }
.val { font-size: 11px; }
#roomT { width: 48px !important; min-width: 48px; display: inline-block; }
</style>
</head>
<body>

<div style="text-align:center;font-size:14px;font-weight:700;padding:6px 0 4px;color:#245eaf">THC 标准气充装记录</div>

<table>
<thead>
<tr><td class="row-title" colspan="5">理论计算</td></tr>
<tr>
<td class="td-hdr">组份</td>
<td class="td-hdr">ppm</td>
<td class="td-hdr">mg/m³</td>
<td class="td-hdr">mgC/m³</td>
<td class="td-hdr">ppmC</td>
</tr>
</thead>
<tbody class="s2">
<tr>
<td class="td-hdr">CH₄</td>
<td><input type="number" id="ch4_ppm" value="97" step="any" oninput="th('ch4','ppm')"></td>
<td><input type="number" id="ch4_mgm3" step="any" oninput="th('ch4','mgm3')"></td>
<td><input type="number" id="ch4_mgcm3" step="any" oninput="th('ch4','mgcm3')"></td>
<td><input type="number" id="ch4_ppmc" step="any" oninput="th('ch4','ppmc')"></td>
</tr>
<tr>
<td class="td-hdr">C₃H₈</td>
<td><input type="number" id="c3_ppm" value="32.3" step="any" oninput="th('c3','ppm')"></td>
<td><input type="number" id="c3_mgm3" step="any" oninput="th('c3','mgm3')"></td>
<td><input type="number" id="c3_mgcm3" step="any" oninput="th('c3','mgcm3')"></td>
<td><input type="number" id="c3_ppmc" step="any" oninput="th('c3','ppmc')"></td>
</tr>
<tr>
<td class="td-hdr">理论摩尔</td>
<td colspan="2" style="text-align:left;padding-left:6px"><span class="val" id="v_mol">--</span> mol</td>
<td colspan="2">室温：<input type="number" id="roomT" value="24.1" step="0.1" oninput="run()"> °C</td>
</tr>
</tbody>
<thead>
<tr><td class="row-title" colspan="5">实际充装</td></tr>
<tr>
<td class="td-hdr">组份</td>
<td class="td-hdr">CH₄</td>
<td class="td-hdr">C₃H₈</td>
<td class="td-hdr">N₂</td>
<td class="td-hdr">Air</td>
</tr>
</thead>
<tbody class="s2">
<tr><td class="td-hdr">分子量</td><td><span class="val" id="ch4_c">--</span></td><td><span class="val" id="c3_c">--</span></td><td><span class="val">28.01</span></td><td><span class="val">28.85</span></td></tr>
<tr><td class="td-hdr">纯度%</td><td><input type="number" id="ch4_p" value="100" step="0.01" oninput="run()"></td><td><input type="number" id="c3_p" value="100" step="0.01" oninput="run()"></td><td><span class="val">100</span></td><td><span class="val">100</span></td></tr>
<tr><td class="td-hdr">计算g</td><td><span class="val" id="ch4_e">--</span></td><td><span class="val" id="c3_e">--</span></td><td><span class="val" id="n2_e">--</span></td><td><span class="val" id="air_e">--</span></td></tr>
<tr><td class="td-hdr">充装</td><td><strong><span class="val" id="ch4_f">--</span></strong></td><td><strong><span class="val" id="c3_f">--</span></strong></td><td><input type="number" id="n2_f" value="956" step="any" oninput="run()"></td><td><input type="number" id="air_f" value="0" step="any" oninput="run()"></td></tr>
<tr><td class="td-hdr">单位</td><td><span class="val">ml</span></td><td><span class="val">ml</span></td><td><span class="val">g</span></td><td><span class="val">g</span></td></tr>
<tr><td class="td-hdr">摩尔数</td><td><span class="val" id="ch4_h">--</span></td><td><span class="val" id="c3_h">--</span></td><td><span class="val" id="n2_h">--</span></td><td><span class="val" id="air_h">--</span></td></tr>
<tr><td class="td-hdr">组分摩尔</td><td><span class="val" id="ch4_i">--</span></td><td><span class="val" id="c3_i">--</span></td><td></td><td></td></tr>
<tr><td class="td-hdr">ppm</td><td><span class="val" id="ch4_j">--</span></td><td><span class="val" id="c3_j">--</span></td><td></td><td></td></tr>
<tr><td class="td-hdr">mg/m³</td><td><span class="val" id="ch4_k">--</span></td><td><span class="val" id="c3_k">--</span></td><td></td><td></td></tr>
<tr><td class="td-hdr">mgC/m³</td><td><span class="val" id="ch4_l">--</span></td><td><span class="val" id="c3_l">--</span></td><td></td><td></td></tr>
<tr class="sum"><td>烃总体积</td><td style="text-align:left;padding-left:6px"><span id="tot_vol">--</span></td><td>总摩尔数</td><td style="text-align:left;padding-left:6px"><span id="tot_mol">--</span></td><td></td></tr>
</tbody>
</table>

<div style="padding:5px 0"><input type="text" id="remark" placeholder="备注/时间戳"></div>

<script>
const F = { ch4: { m: 0.71607, c: 0.53616, p: 1 }, c3: { m: 1.96858, c: 1.60848, p: 3 } };
const MW = { ch4: 16.04, c3: 44.0962, n2: 28.01, air: 28.8479 };
const $ = id => document.getElementById(id), v = id => parseFloat($(id).value) || 0;
const sv = (id, val) => { const e = $(id); if (document.activeElement !== e) e.value = isNaN(val) ? '' : +val.toFixed(1); };
const sr = (id, val) => $(id).textContent = isNaN(val) ? '--' : +val.toFixed(4);
const s6 = (id, val) => $(id).textContent = isNaN(val) ? '--' : +val.toFixed(6);
const sp = (id, val, p) => $(id).textContent = isNaN(val) ? '--' : parseFloat(val.toPrecision(p));
let _lock = false;

function th(gas, from) {
  if (_lock) return;
  _lock = true;
  const f = F[gas], x = v(gas + '_' + from);
  if (from === 'ppm') {
    sv(gas + '_mgm3', x * f.m); sv(gas + '_mgcm3', x * f.c); sv(gas + '_ppmc', x * f.p);
  } else {
    const r = from === 'mgm3' ? f.m : from === 'mgcm3' ? f.c : f.p, ppm = x / r;
    sv(gas + '_ppm', ppm); sv(gas + '_mgm3', ppm * f.m); sv(gas + '_mgcm3', ppm * f.c); sv(gas + '_ppmc', ppm * f.p);
  }
  run(); _lock = false;
}

function calc(gas, ppm, TK, p) {
  const V = TK / 273.15 * (gas === 'ch4' ? 22.36 : 22.064);
  const e = 34 * 293.15 / TK * ppm * MW[gas] / 1e6;
  const f = e * 1000 * V / MW[gas] / p * 100;
  const h = f / V / 1000, i = h * p / 100;
  sr(gas + '_c', V); sr(gas + '_e', e); sp(gas + '_f', f, 4); s6(gas + '_h', h); s6(gas + '_i', i);
  return { V, e, f, h, i };
}

function run() {
  const ch4_ppm = v('ch4_ppm'), c3_ppm = v('c3_ppm'), T = v('roomT'), TK = 273.15 + T;
  sr('v_mol', 34 * 293.15 / TK);
  const ch4 = calc('ch4', ch4_ppm, TK, v('ch4_p')), c3 = calc('c3', c3_ppm, TK, v('c3_p'));
  const e11 = (34 * 293.15 / TK - ch4.h - c3.h) * MW.n2, h11 = v('n2_f') / MW.n2;
  sr('n2_e', Math.round(e11)); s6('n2_h', h11);
  const e12 = (34 * 293.15 / TK - ch4.h - c3.h) * MW.air, h12 = v('air_f') / MW.air;
  sr('air_e', Math.round(e12)); s6('air_h', h12);
  const tot = ch4.h + c3.h + h11 + h12, tC = tot > 0;
  const j9 = tC ? ch4.i / tot * 1e6 : 0, j10 = tC ? c3.i / tot * 1e6 : 0;
  sp('ch4_j', j9, 3); sp('ch4_k', j9 * MW.ch4 / 22.4, 3); sp('ch4_l', j9 * 12.01 / 22.4, 3);
  sp('c3_j', j10, 3); sp('c3_k', j10 * MW.c3 / 22.4, 3); sp('c3_l', j10 * 36.03 / 22.4, 3);
  sr('tot_vol', +(ch4.f * v('ch4_p') * 0.99 / 100 + c3.f * v('c3_p') * 0.99 / 100).toFixed(1));
  sr('tot_mol', tot);
}

window.addEventListener('DOMContentLoaded', () => {
  const d = new Date(), pad = n => String(n).padStart(2, '0');
  $('remark').value = d.getFullYear() + '年' + pad(d.getMonth() + 1) + '月' + pad(d.getDate()) + '日 ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  th('ch4', 'ppm'); th('c3', 'ppm');
});
</script>
</body>
</html>
