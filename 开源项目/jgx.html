<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>人生计时</title>
</head>
<body style="margin:0;font-size:9px;color:#666;">
<span class="count"></span>
<script>
(function () {
  function fmt(n) { return n < 10 ? "0" + n : n; }
  function tick() {
    var t = Math.floor((Date.now() - Date.parse("1986/10/12 12:40:00")) / 1000);
    if (t < 0) { document.querySelector(".count").textContent = "计时结束"; return; }
    var d = Math.floor(t / 86400);
    document.querySelector(".count").textContent = "人生的第 " + d + " 天";
    setTimeout(tick, 1000);
  }
  tick();
})();
</script>
