<!DOCTYPE html>
<html>
<head>
<title>SVG时钟</title>
<style>
#clock{ stroke:black; stroke-linecap:round; fill:#eef; }
#face{ stroke-width:3px; }
#ticks{ stroke-width:2; }
#hourhand{ stroke-width:5px; }
#minutehand{ stroke-width:3px; }
#numbers{
  font-family:sans-serif; font-size:7pt; font-weight:bold;
  text-anchor:middle; stroke:none; fill:black;
}
</style>
</head>
<body onload="updateTime()">
<svg id="clock" viewBox="0 0 100 100" width="300" height="300">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="1" dy="1" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle id="face" cx="50" cy="50" r="45"/>
  <g id="ticks">
    <line x1="50" y1="5"   x2="50"    y2="10"/>
    <line x1="72.5" y1="11.03" x2="70" y2="15.36"/>
    <line x1="89"   y1="27.5"  x2="84.64" y2="30"/>
    <line x1="95"   y1="50"   x2="90"    y2="50"/>
    <line x1="89"   y1="72.5"  x2="84.64" y2="70"/>
    <line x1="72.5" y1="89"    x2="70"    y2="84.64"/>
    <line x1="50"   y1="95"   x2="50"    y2="90"/>
    <line x1="27.5" y1="89"    x2="30"    y2="84.64"/>
    <line x1="11"   y1="72.5"  x2="15.36" y2="70"/>
    <line x1="5"    y1="50"   x2="10"    y2="50"/>
    <line x1="11"   y1="27.5"  x2="15.36" y2="30"/>
    <line x1="27.5" y1="11.03" x2="30"    y2="15.36"/>
  </g>
  <g id="numbers">
    <text x="50" y="18">12</text>
    <text x="85" y="53">3</text>
    <text x="50" y="88">6</text>
    <text x="15" y="53">9</text>
    <text x="50" y="70" font-size="6">jinguo.xin</text>
  </g>
  <g id="hands" filter="url(#shadow)">
    <line id="hourhand"   x1="50" y1="50" x2="50" y2="24"/>
    <line id="minutehand" x1="50" y1="50" x2="50" y2="20"/>
  </g>
</svg>
<script>
function updateTime(){
  var now=new Date();
  var min=now.getMinutes();
  var hour=(now.getHours()%12)+min/60;
  document.getElementById("minutehand").setAttribute("transform","rotate("+min*6+",50,50)");
  document.getElementById("hourhand").setAttribute("transform","rotate("+hour*30+",50,50)");
  setTimeout(updateTime,60000);
}
</script>
</body>
</html>
