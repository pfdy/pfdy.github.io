<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>RMB大写转换</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#e8ecf3;display:flex;justify-content:center;align-items:center;min-height:100vh}
.box{background:#fff;padding:24px 32px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);width:420px}
.box h3{margin-bottom:12px;color:#333}
.box input{width:100%;padding:8px 10px;font-size:15px;border:1px solid #ccc;border-radius:5px;margin-bottom:10px}
.box input:focus{border-color:#245eaf;outline:none}
.box button{width:100%;padding:8px;font-size:15px;background:#245eaf;color:#fff;border:none;border-radius:5px;cursor:pointer}
.box button:hover{background:#1a4a8a}
.box .result{margin-top:10px;padding:8px 10px;background:#f5f5f5;border-radius:5px;font-size:14px;color:#333;min-height:36px}
</style>
</head>
<body>
<div class="box">
  <h3>RMB 大写转换</h3>
  <input type="text" id="Digits" placeholder="输入金额，如 3096" value="3096">
  <button onclick="doConvert()">转换为大写金额</button>
  <div class="result" id="Result">结果将显示在这里</div>
</div>
<script>
function convertCurrency(n){
  n=String(n).replace(/,/g,"").replace(/^0+/,"")||"0";
  if(!/^\d+(\.\d{1,2})?$/.test(n)) return "格式错误，请输入数字（最多两位小数）";
  if(Number(n)>999999999999.99) return "金额过大，应小于9999亿元！";

  var D=["零","壹","贰","叁","肆","伍","陆","柒","捌","玖"];
  var DW=["","拾","佰","仟"], BW=["","万","亿"];
  var dec=n.split("."), intPart=dec[0], decPart=dec[1]||"";
  var s="", zero=false;

  // 整数部分
  for(var i=0;i<intPart.length;i++){
    var d=intPart.charAt(i), pos=intPart.length-i-1, q=Math.floor(pos/4), r=pos%4;
    if(d==="0"){ zero=true; if(r===0&&q>0&&!s.endsWith("零")) s+=(q===2?"亿":q===1?"万":""); }
    else{ if(zero) s+="零"; s+=D[+d]+DW[r]; if(r===0&&q>0) s+=(q===2?"亿":q===1?"万":""); zero=false; }
  }
  if(s==="") s="零";
  s+="元";

  // 小数部分
  if(decPart===""||decPart==="00") s+="整";
  else{
    if(decPart.length===1) decPart+="0";
    if(decPart.charAt(0)!=="0") s+=D[+decPart.charAt(0)]+"角";
    else if(!s.endsWith("零")) s+="零";
    if(decPart.charAt(1)!=="0") s+=D[+decPart.charAt(1)]+"分";
  }
  return s;
}

function doConvert(){
  document.getElementById("Result").textContent=convertCurrency(document.getElementById("Digits").value);
}
</script>
</body>
</html>
