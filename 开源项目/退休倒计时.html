<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>退休倒计时</title>
</head>
<body style="margin:0">
<span id="count"></span>
<script>
(function () {
  var endtime = new Date("2049/09/09,12:00:00");
  var el = document.getElementById("count");

  function pad(n) {
    return n < 10 ? "0" + n : String(n);
  }

  function countDown() {
    var lefttime = parseInt((endtime.getTime() - Date.now()) / 1000);
    if (lefttime <= 0) {
      el.innerHTML = "计算结果为负数";
      return;
    }
    var d = parseInt(lefttime / 86400);
    var h = parseInt(lefttime / 3600 % 24);
    var m = parseInt(lefttime / 60 % 60);
    var s = lefttime % 60;
    el.innerHTML = "距离退休还有 " + pad(d) + "天";
  }

  countDown();
  setInterval(countDown, 1000);
})();
</script>
